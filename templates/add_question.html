<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Add Questions | EXIM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

<style>
body { font-family: "Poppins", Arial, sans-serif; background:#f4f6f8; color:#333; }

h1 { text-align:center; margin:40px 0 20px; font-weight:600; }

form { max-width:900px; margin:0 auto 50px; }

.question-block {
  border:1px solid #e5e7eb;
  border-radius:10px;
  background:#fff;
  padding:15px;
  margin-bottom:20px;
}

.upload-button {
  display:none;
  width:100%;
  padding:12px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:8px;
}

.generate-btn {
  background:#10b981;
  color:#fff;
  border:none;
  width:100%;
}

.board-exam-box {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.form-check {
  min-width:160px;
}
</style>
</head>

<body>

<h1>Add Questions</h1>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}

<div class="row g-3 align-items-end mb-4">

  <div class="col-md-6">
    <label class="form-label fw-semibold">Select Board Exam(s)</label>

    <div class="board-exam-box">
      {% for exam in BOARD_EXAMS %}
      <div class="form-check">
        <input class="form-check-input"
               type="checkbox"
               name="board_exam_checkbox"
               value="{{ exam }}">
        <label class="form-check-label">{{ exam }}</label>
      </div>
      {% endfor %}
    </div>

  </div>

  <div class="col-md-4">
    <label class="form-label fw-semibold">Number of Questions</label>
    <input type="number" id="numQuestions" class="form-control" min="1" max="50">
  </div>

  <div class="col-md-2">
    <button type="button" class="btn generate-btn" id="createBtn">
      Create
    </button>
  </div>

</div>

<div id="questionsContainer"></div>

<button type="submit" class="upload-button mt-3">
  Save All Questions
</button>

</form>

<script>
document.addEventListener("DOMContentLoaded", function () {

const BOARD_EXAM_TOPICS = JSON.parse('{{ BOARD_EXAM_TOPICS_JSON|escapejs }}');
const LEVELS = JSON.parse('{{ LEVELS_JSON|escapejs }}');

function updateTopics(i, subjectsObj, selectedSubjects) {
    const select = document.querySelector(`select[name="topic_${i}"]`);
    if (!select) return;

    select.innerHTML = "";

    select.appendChild(new Option("--Select Topic--", ""));

    selectedSubjects.forEach(sub => {
        (subjectsObj[sub] || []).forEach(topic => {
            select.appendChild(new Option(topic, topic));
        });
    });
}

function createQuestionBlock(i, preset = {}) {

    const container = document.getElementById("questionsContainer");

    const block = document.createElement("div");
    block.className = "question-block";

    let levelOptions = LEVELS.map(l =>
        `<option>${l}</option>`
    ).join("");

    block.innerHTML = `
        <h5>Question ${i}</h5>

        <textarea name="question_text_${i}" class="form-control mb-2" required></textarea>

        <!-- IMAGE FIX -->
        <input type="file" name="image_${i}" class="form-control mb-2">

        <!-- SUBJECTS -->
        <div class="mb-2">
            <label>Subjects</label>
            <select multiple class="form-select subjects" data-i="${i}">
                ${Object.keys(preset.subjectsObj || {}).map(sub =>
                    `<option value="${sub}">${sub}</option>`
                ).join("")}
            </select>
        </div>

        <!-- TOPIC -->
        <div class="mb-2">
            <label>Topic</label>
            <select name="topic_${i}" class="form-select"></select>
        </div>

        <!-- LEVEL -->
        <div class="mb-2">
            <label>Difficulty</label>
            <select name="level_${i}" class="form-select">
                ${levelOptions}
            </select>
        </div>

        <!-- CHOICES -->
        <label>Choices</label>
        ${["A","B","C","D","E"].map(l =>
            `<input class="form-control mb-1" name="choice${l}_${i}" placeholder="${l}">`
        ).join("")}

        <label>Correct Answer</label>
        <select name="correct_answer_${i}" class="form-select mb-2">
            ${["A","B","C","D","E"].map(l => `<option>${l}</option>`).join("")}
        </select>
    `;

    container.appendChild(block);

    const subjectSelect = block.querySelector(".subjects");

    subjectSelect.addEventListener("change", function () {
        const selected = Array.from(this.selectedOptions).map(o => o.value);
        updateTopics(i, preset.subjectsObj || {}, selected);
    });
}

// CREATE BUTTON
document.getElementById("createBtn").addEventListener("click", function () {

    const num = parseInt(document.getElementById("numQuestions").value);
    const selectedBoards = Array.from(
        document.querySelectorAll("input[name='board_exam_checkbox']:checked")
    ).map(x => x.value);

    if (!num || !selectedBoards.length) {
        alert("Select board exam + number of questions");
        return;
    }

    let subjectsObj = {};
    selectedBoards.forEach(b => {
        Object.assign(subjectsObj, BOARD_EXAM_TOPICS[b] || {});
    });

    document.getElementById("questionsContainer").innerHTML = "";

    for (let i = 1; i <= num; i++) {
        createQuestionBlock(i, { subjectsObj });
    }

    document.querySelector(".upload-button").style.display = "block";
});

});
</script>

</body>
</html>
