<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup | EXIM</title>

  {% load static %}

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: "Poppins", Arial, sans-serif;
      background-color: #f4f6f8;
      color: #333;
    }

    .navbar {
      background-color: #1f2937;
      padding: 0.5rem 1rem;
    }

    .navbar-brand {
      color: #fff !important;
      font-weight: 600;
    }

    .signup-container {
      max-width: 420px;
      margin: 40px auto;
      background: #fff;
      padding: 22px;
      border-radius: 12px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.08);
    }

    .signup-container img {
      display: block;
      margin: 0 auto 10px;
      max-width: 120px;
    }

    h2 {
      text-align: center;
      font-weight: 600;
      margin-bottom: 18px;
    }

    label {
      font-weight: 500;
      font-size: 0.9rem;
    }

    input, select {
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
    }

    .form-group {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #6b7280;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
    }

    button:hover {
      background: #059669;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand">EXIM</a>
    <a class="text-white ms-auto" href="{% url 'login' %}">Login</a>
  </div>
</nav>

<!-- Signup -->
<div class="signup-container">

  <img src="{% static 'EXIM2.png' %}" alt="EXIM Logo">
  <h2>Create Account</h2>

  {% if messages %}
    {% for message in messages %}
      <p style="color:green;font-weight:bold">{{ message }}</p>
    {% endfor %}
  {% endif %}

  <form method="post" id="signup-form">
    {% csrf_token %}

    <!-- ROLE -->
    <label>Role</label>
    <select id="role" name="role" required>
      <option value="student">Examinee</option>
      <option value="teacher">Examiner</option>
    </select>

    <!-- COURSE (only for student) -->
    <div id="courseField">
      <label>Course</label>
      <select name="course">
        <option value="Civil Engineering">BS Civil Engineering</option>
        <option value="Electrical Engineering">BS Electrical Engineering</option>
        <option value="Electronics Engineering">BS Electronics Engineering</option>
        <option value="Mechanical Engineering">BS Mechanical Engineering</option>
      </select>
    </div>

    <!-- PERSONAL INFO -->
    <label>Last Name</label>
    <input type="text" name="last_name" required>

    <label>First Name</label>
    <input type="text" name="first_name" required>

    <label>Middle Name</label>
    <input type="text" name="middle_name">

    <label>Birthdate</label>
    <input type="date" name="birthdate">

    <label>Email</label>
    <input type="email" name="email" required>

    <!-- PASSWORD -->
    <label>Password</label>
    <div class="form-group">
      <input type="password" id="password" name="password" required>
      <span class="password-toggle" onclick="togglePassword('password')">
        <i class="fas fa-eye"></i>
      </span>
    </div>

    <label>Retype Password</label>
    <div class="form-group">
      <input type="password" id="retype_password" name="retype_password" required>
      <span class="password-toggle" onclick="togglePassword('retype_password')">
        <i class="fas fa-eye"></i>
      </span>
    </div>

    <button type="button" onclick="submitForm()">Sign Up</button>
  </form>
</div>

<script>
  function submitForm() {
    document.getElementById("signup-form").submit();
  }

  function togglePassword(id) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
  }

  function toggleFields() {
    const role = document.getElementById("role").value;
    document.getElementById("courseField").style.display =
      role === "student" ? "block" : "none";
  }

  document.getElementById("role").addEventListener("change", toggleFields);
  toggleFields();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
